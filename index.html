<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Mio Itinerario - Label Perfette</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        #sidebar {
            width: 320px; background: #fdfdfd; padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 1000;
            display: flex; flex-direction: column;
        }

        #map { flex-grow: 1; cursor: crosshair; }

        #appTitle { color: #2c3e50; margin: 0 0 10px 0; font-size: 1.4em; cursor: pointer; }
        #appTitleInput { font-size: 1.4em; font-weight: bold; margin-bottom: 10px; width: 100%; display: none; }

        .search-group { margin-bottom: 20px; }
        input, button, textarea, select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; font-family: inherit; }

        button.btn-primary { background: #27ae60; color: white; border: none; font-weight: bold; cursor: pointer; }

        #itineraryList { flex-grow: 1; overflow-y: auto; margin-bottom: 15px; padding-right: 5px; }

        .io-group {
            display: flex; gap: 10px;
            margin-top: auto;
            padding-top: 15px; border-top: 1px solid #eee;
        }
        button.btn-secondary {
            background: #3498db; color: white; border: none;
            font-weight: bold; cursor: pointer; font-size: 0.8em; flex: 1;
        }
        button:hover { opacity: 0.9; }

        .itinerary-item {
            background: white; border: 1px solid #eee; border-left: 5px solid #e74c3c;
            padding: 12px; margin-bottom: 10px; border-radius: 4px; font-size: 0.9em;
        }
        .itinerary-note { font-style: italic; color: #666; margin-top: 5px; font-size: 0.85em; border-top: 1px dashed #eee; padding-top: 5px; }

        /* Stile Label */
        .custom-tooltip {
            background: #333; color: white; border: none; font-weight: bold;
            border-radius: 4px; padding: 2px 8px; font-size: 11px;
            white-space: nowrap;
        }
        .leaflet-tooltip-pane .leaflet-tooltip-top::before { border-top-color: #333; }

        /* Popup Form */
        .popup-form label { display: block; margin-top: 8px; font-size: 11px; color: #666; font-weight: bold; }
        .popup-form textarea { height: 50px; resize: none; font-size: 12px; }
        .popup-form button { margin-top: 12px; background: #3498db; color: white; border:none; padding: 8px; cursor:pointer; width: 100%; font-weight: bold; border-radius: 4px; }

        /* Icone personalizzate (SVG) */
        .svg-icon { display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 id="appTitle" title="Doppio click per modificare" ondblclick="abilitaModificaTitolo()">Il Mio Viaggio</h2>
    <input type="text" id="appTitleInput" onblur="salvaTitolo()" onkeydown="if(event.key==='Enter')salvaTitolo()">

    <div class="search-group">
        <input type="text" id="searchBox" placeholder="Cerca località...">
        <button class="btn-primary" onclick="searchPlace()">Cerca</button>
    </div>

    <h3 style="font-size: 0.9em; color: #7f8c8d; margin-bottom: 5px;">Tappe Itinerario</h3>
    <div id="itineraryList"></div>

    <div class="io-group">
        <button class="btn-secondary" onclick="exportJSON()">⬇️ Esporta</button>
        <button class="btn-secondary" onclick="document.getElementById('importInput').click()">⬆️ Importa</button>
        <input type="file" id="importInput" style="display:none" accept=".json" onchange="importJSON(event)">
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { doubleClickZoom: false }).setView([41.9028, 12.4964], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let tappe = [];

    // Funzione per creare icone colorate via SVG
    function creaIcona(colore) {
        return L.divIcon({
            className: 'svg-icon',
            html: `<svg width="30" height="42" viewBox="0 0 30 42" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 0C6.71573 0 0 6.71573 0 15C0 26.25 15 42 15 42C15 42 30 26.25 30 15C30 6.71573 23.2843 0 15 0ZM15 20.625C11.8934 20.625 9.375 18.1066 9.375 15C9.375 11.8934 11.8934 9.375 15 9.375C18.1066 9.375 20.625 11.8934 20.625 15C20.625 18.1066 18.1066 20.625 15 20.625Z" fill="${colore}"/>
                       </svg>`,
            iconSize: [30, 42],
            iconAnchor: [15, 42],
            popupAnchor: [0, -40]
        });
    }

    // --- TITOLO ---
    function abilitaModificaTitolo() {
        document.getElementById('appTitle').style.display = 'none';
        const input = document.getElementById('appTitleInput');
        input.style.display = 'block';
        input.value = document.getElementById('appTitle').innerText;
        input.focus();
    }
    function salvaTitolo() {
        const val = document.getElementById('appTitleInput').value;
        if(val.trim()) document.getElementById('appTitle').innerText = val;
        document.getElementById('appTitleInput').style.display = 'none';
        document.getElementById('appTitle').style.display = 'block';
    }

    // --- MAPPA E PIN ---
    map.on('dblclick', e => addTappa(e.latlng.lat, e.latlng.lng, "Nuovo Punto"));

    async function searchPlace() {
        const q = document.getElementById('searchBox').value;
        if (!q) return;
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}`);
        const data = await res.json();
        if (data.length > 0) {
            addTappa(data[0].lat, data[0].lon, data[0].display_name.split(',')[0]);
            map.setView([data[0].lat, data[0].lon], 12);
        }
    }

    function addTappa(lat, lng, label, orario = "--:--", ordine = null, note = "", tipo = "tappa") {
        const id = Date.now() + Math.random();
        const nuovaTappa = {
            id, lat, lng, label, orario, note, tipo,
            ordine: ordine || tappe.length + 1
        };

        const colore = tipo === "tappa" ? "#e74c3c" : "#f1c40f";
        const marker = L.marker([lat, lng], { icon: creaIcona(colore) }).addTo(map);

        // L'offset è stato modificato qui: -45 px verso l'alto
        marker.bindTooltip(nuovaTappa.label, {
            permanent: true,
            direction: 'top',
            className: 'custom-tooltip',
            offset: [0, -45]
        });

        marker.bindPopup(() => creaFormPopup(nuovaTappa));

        nuovaTappa.marker = marker;
        tappe.push(nuovaTappa);
        aggiornaUI();
    }

    function creaFormPopup(tappa) {
        const div = document.createElement('div');
        div.className = 'popup-form';
        div.innerHTML = `
                <label>Tipo Punto</label>
                <select id="ed-tipo-${tappa.id}">
                    <option value="tappa" ${tappa.tipo === 'tappa' ? 'selected' : ''}>Tappa (Rosso)</option>
                    <option value="interesse" ${tappa.tipo === 'interesse' ? 'selected' : ''}>Interesse (Giallo)</option>
                </select>
                <label>Etichetta</label><input type="text" id="ed-l-${tappa.id}" value="${tappa.label}">
                <label>Orario</label><input type="time" id="ed-t-${tappa.id}" value="${tappa.orario !== '--:--' ? tappa.orario : ''}">
                <label>Ordine</label><input type="number" id="ed-o-${tappa.id}" value="${tappa.ordine}">
                <label>Note</label><textarea id="ed-n-${tappa.id}">${tappa.note}</textarea>
                <button onclick="salvaModifiche(${tappa.id})">Salva</button>
            `;
        return div;
    }

    window.salvaModifiche = function(id) {
        const t = tappe.find(x => x.id === id);
        t.tipo = document.getElementById(`ed-tipo-${id}`).value;
        t.label = document.getElementById(`ed-l-${id}`).value || "Punto";
        t.orario = document.getElementById(`ed-t-${id}`).value || "--:--";
        t.ordine = parseInt(document.getElementById(`ed-o-${id}`).value);
        t.note = document.getElementById(`ed-n-${id}`).value;

        // Aggiorna colore e label
        const nuovoColore = t.tipo === "tappa" ? "#e74c3c" : "#f1c40f";
        t.marker.setIcon(creaIcona(nuovoColore));
        t.marker.setTooltipContent(t.label);
        t.marker.closePopup();
        aggiornaUI();
    };

    function aggiornaUI() {
        const list = document.getElementById('itineraryList');
        list.innerHTML = '';

        const soloTappe = tappe.filter(t => t.tipo === "tappa");
        soloTappe.sort((a, b) => a.ordine - b.ordine);

        soloTappe.forEach(t => {
            const div = document.createElement('div');
            div.className = 'itinerary-item';
            let noteHtml = t.note ? `<div class="itinerary-note">${t.note.replace(/\n/g, '<br>')}</div>` : '';
            div.innerHTML = `
                    <b>#${t.ordine} - ${t.label}</b><br>
                    <small>🕒 ${t.orario}</small>
                    ${noteHtml}
                `;
            list.appendChild(div);
        });
    }

    // --- IMPORT / EXPORT ---
    function exportJSON() {
        const datiDaSalvare = {
            titolo: document.getElementById('appTitle').innerText,
            tappe: tappe.map(t => ({
                lat: t.lat, lng: t.lng, label: t.label,
                orario: t.orario, ordine: t.ordine, note: t.note, tipo: t.tipo
            }))
        };
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(datiDaSalvare));
        const dl = document.createElement('a');
        dl.setAttribute("href", dataStr);
        dl.setAttribute("download", "viaggio.json");
        dl.click();
    }

    function importJSON(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const json = JSON.parse(e.target.result);
                tappe.forEach(t => map.removeLayer(t.marker));
                tappe = [];
                if(json.titolo) document.getElementById('appTitle').innerText = json.titolo;
                json.tappe.forEach(t => {
                    addTappa(t.lat, t.lng, t.label, t.orario, t.ordine, t.note || "", t.tipo || "tappa");
                });
                if(tappe.length > 0) {
                    const group = new L.featureGroup(tappe.map(t => t.marker));
                    map.fitBounds(group.getBounds().pad(0.5));
                }
            } catch (err) { alert("Errore nel file."); }
        };
        reader.readAsText(file);
    }
</script>
</body>
</html>
